[package]
name = "sqlite-sync"
version = "1.0.12"
edition = "2021"
description = "Static Rust bindings for the SQLite Sync (cloudsync) extension — sync on-device SQLite databases with the cloud"
repository = "https://github.com/sqliteai/sqlite-sync"
homepage = "https://github.com/sqliteai/sqlite-sync"
license = "Elastic 2.0"
keywords = ["sqlite", "sqlite-extension", "sync", "crdt", "offline-first"]
categories = ["database", "api-bindings"]
readme = "README.md"
include = [
  "src/**/*",
  "csrc/**/*",
  "build.rs",
  "Cargo.toml",
  "README.md",
  "LICENSE.md",
]

# The C-side network layer (cloudsync_network_init, cloudsync_network_sync,
# etc.) is always compiled in. Its HTTP transport primitives
# (`network_send_buffer`, `network_receive_buffer`) are provided from Rust.
#
# By default the `ureq-transport` feature supplies them via ureq + rustls —
# no system libcurl or OpenSSL required. Disable default-features to drop
# ureq and provide your own `#[no_mangle] extern "C"` implementations of
# those two symbols; missing symbols surface as a link-time error.
[features]
default = ["ureq-transport"]
ureq-transport = ["dep:ureq"]

[dependencies]
ureq = { version = "2", optional = true, default-features = false, features = [
  "tls",
] }

[build-dependencies]
cc = "1"

[dev-dependencies]
rusqlite = { version = "0.35", features = ["bundled"] }
